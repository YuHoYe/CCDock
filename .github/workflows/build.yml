name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build with Swift
        run: swift build

      - name: Run tests
        run: swift test

      - name: Build .app bundle
        run: ./build-app.sh
